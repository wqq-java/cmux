name: Self-build (unsigned, self-use)

# Build an ad-hoc signed cmux.app for personal use by pulling the
# cmux-pinned prebuilt GhosttyKit.xcframework (avoids the need for zig
# and works around Ghostty's macOS-26-only .icon asset format which
# fails to compile on macos-15 runners).
#
# Strategy:
# - Track the cmux submodule pin exactly (including its tested Ghostty SHA).
# - Download the pinned xcframework via scripts/download-prebuilt-ghosttykit.sh.
# - xcodebuild arm64, no signing; ad-hoc re-sign the bundle.
# - Strip Sparkle so the build does not silently "update" back to manaflow's
#   signed release.
#
# To bump Ghostty, first bump cmux upstream (their release cycle pins a new
# Ghostty commit + publishes a matching prebuilt xcframework), then sync
# this fork and re-run the workflow.

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
  schedule:
    # Weekly rebuild (Mondays 03:00 UTC) in case runner toolchain changes.
    - cron: '0 3 * * 1'

concurrency:
  group: my-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to fast-forward fork's main from upstream
  actions: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # need full history to fast-forward-merge upstream

      - name: Sync fork with upstream manaflow-ai/cmux
        # Uses the runner's built-in GITHUB_TOKEN (contents:write is granted at
        # the permissions block above). This avoids needing contents:write on
        # the externally-provided PAT that triggers this workflow.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS -w '\nHTTP %{http_code}\n' -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/merge-upstream" \
            -d '{"branch":"main"}' || true)
          echo "$RESP"
          # Then refresh the local workspace to pick up any newly-merged commits.
          git fetch origin main
          git reset --hard origin/main
          git submodule update --init --recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode_*.app /Applications/Xcode.app 2>/dev/null | sort -V | tail -n 1)"
          [ -n "$XCODE_APP" ] || { echo "No Xcode.app found" >&2; exit 1; }
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Install zig (for Ghostty CLI helper only; libghostty is prebuilt)
        run: |
          set -euo pipefail
          ZIG_VER=0.15.2
          curl -fSL "https://ziglang.org/download/${ZIG_VER}/zig-aarch64-macos-${ZIG_VER}.tar.xz" -o /tmp/zig.tar.xz
          tar xf /tmp/zig.tar.xz -C /tmp
          sudo mkdir -p /usr/local/bin /usr/local/lib
          sudo cp -f /tmp/zig-aarch64-macos-${ZIG_VER}/zig /usr/local/bin/zig
          sudo cp -rf /tmp/zig-aarch64-macos-${ZIG_VER}/lib /usr/local/lib/zig
          zig version

      - name: Report pinned Ghostty SHA
        id: ghostty
        run: |
          set -euo pipefail
          SHA="$(git -C ghostty rev-parse HEAD)"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short=${SHA:0:12}" >> "$GITHUB_OUTPUT"
          echo "==> cmux-pinned Ghostty: $SHA"

      - name: Download prebuilt GhosttyKit.xcframework
        run: |
          set -euo pipefail
          ./scripts/download-prebuilt-ghosttykit.sh
          test -d GhosttyKit.xcframework

      - name: Personalize About panel URLs (pre-build)
        # Point the About panel's "GitHub" button and commit link at the fork
        # instead of upstream. Source edit — no Info.plist field supports this.
        run: |
          set -euo pipefail
          sed -i '' 's|manaflow-ai/cmux|wqq-java/cmux|g' Sources/cmuxApp.swift
          grep -n "wqq-java/cmux" Sources/cmuxApp.swift | head -5 || true

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Package.resolved') }}
          restore-keys: spm-

      - name: xcodebuild (arm64, unsigned)
        env:
          CONFIG: ${{ github.event.inputs.configuration || 'Release' }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project GhosttyTabs.xcodeproj \
            -scheme cmux \
            -configuration "$CONFIG" \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath .spm-cache \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Locate built app
        id: app
        run: |
          set -euo pipefail
          CONFIG="${{ github.event.inputs.configuration || 'Release' }}"
          APP_PATH="$(ls -d "build/Build/Products/${CONFIG}/"*.app | head -n 1)"
          [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "==> Built $APP_PATH"

      - name: Disable Sparkle auto-update
        run: |
          set -euo pipefail
          APP_PLIST="${{ steps.app.outputs.path }}/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :SUFeedURL" "$APP_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :SUPublicEDKey" "$APP_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :SUEnableAutomaticChecks false" "$APP_PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :SUEnableAutomaticChecks bool false" "$APP_PLIST"
          SHORT_SHA="${{ steps.ghostty.outputs.short }}"
          /usr/libexec/PlistBuddy -c "Add :CMUXSelfBuild string selfbuild-ghostty-${SHORT_SHA}-$(date -u +%Y%m%d)" "$APP_PLIST" 2>/dev/null || true
          # About panel shows NSHumanReadableCopyright at the bottom. Use it as
          # a personal build marker so the About window tells the user "this is
          # a self-build I made", not an official manaflow release.
          COPY_TEXT="自编版 · 构建者 暮色微凉丶 · ghostty ${SHORT_SHA}"
          /usr/libexec/PlistBuddy -c "Set :NSHumanReadableCopyright '$COPY_TEXT'" "$APP_PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :NSHumanReadableCopyright string '$COPY_TEXT'" "$APP_PLIST"

      - name: Ad-hoc sign
        run: |
          set -euo pipefail
          codesign --force --deep --sign - --timestamp=none "${{ steps.app.outputs.path }}"
          codesign --verify --verbose=2 "${{ steps.app.outputs.path }}" || true

      - name: Zip
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.app.outputs.path }}" cmux-selfbuild-arm64.zip
          ls -lh cmux-selfbuild-arm64.zip

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: cmux-selfbuild-arm64-${{ steps.ghostty.outputs.short }}
          path: cmux-selfbuild-arm64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Send email notification
        # Runs whether the job above succeeded or failed (`always()`). Uses
        # secrets stored at repo level (Settings → Secrets → Actions).
        # GitHub-hosted runners have unrestricted SMTP egress, unlike the
        # Anthropic remote-agent sandbox that triggers this workflow.
        if: always()
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_ADDR: ${{ secrets.TO_ADDR }}
          JOB_STATUS: ${{ job.status }}
          GHOSTTY_SHORT: ${{ steps.ghostty.outputs.short }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          ARTIFACT_SIZE: ${{ steps.upload.outputs.artifact-digest }}
        run: |
          set +e
          if [ "$JOB_STATUS" = 'success' ]; then
            SUBJ="✅ cmux 自编版就绪 · ghostty ${GHOSTTY_SHORT}"
            BODY="本次 cmux 自编版构建完成。

Ghostty SHA: ${GHOSTTY_SHORT}
GitHub Actions Run: ${RUN_URL}
Artifact 直链 (登录 GitHub 后可点): ${ARTIFACT_URL}

下载方式 (二选一):
  A. 浏览器登录 wqq-java 后直接点上面 Artifact 直链
  B. 打开 Run URL → 滚到底部 Artifacts 区 → 点 zip

下载到 ~/Downloads/ 之后, 终端跑这条:
cd ~/Downloads && osascript -e 'quit app \"cmux\"' 2>/dev/null; sleep 2; rm -rf /Applications/cmux.app && unzip -o cmux-selfbuild-arm64*.zip && mv cmux.app /Applications/ && xattr -dr com.apple.quarantine /Applications/cmux.app && open /Applications/cmux.app

--
本邮件由 GitHub Actions 自动发送 (workflow 内嵌 Python smtplib)
下次构建时间: 每周一 10:00 Asia/Shanghai (由 Claude Code routine 触发)"
          else
            SUBJ="❌ cmux 自编版构建失败"
            BODY="本次 cmux 自编版构建失败 (job.status=${JOB_STATUS})。

Run URL (点开看哪一步挂了): ${RUN_URL}

排查思路:
- Ghostty SHA: ${GHOSTTY_SHORT} (可能 manaflow upstream 刚合了破坏性改动, 上游 prebuilt 还没出)
- 也可能 Xcode runner image 升级了 Apple SDK 不兼容
- 等 1-2 天 manaflow 那边修了再手动重跑通常就好

要立即重跑: 去 https://github.com/${{ github.repository }}/actions/workflows/my-build.yml 点 Run workflow"
          fi

          export SUBJ
          export BODY
          cat > /tmp/send_mail.py <<'PY'
          import os, smtplib, ssl, sys
          from email.mime.text import MIMEText
          from email.header import Header
          msg = MIMEText(os.environ['BODY'], 'plain', 'utf-8')
          msg['Subject'] = Header(os.environ['SUBJ'], 'utf-8')
          msg['From'] = os.environ['SMTP_USER']
          msg['To'] = os.environ['TO_ADDR']
          try:
              ctx = ssl.create_default_context()
              with smtplib.SMTP('smtp.gmail.com', 587, timeout=30) as s:
                  s.starttls(context=ctx)
                  s.login(os.environ['SMTP_USER'], os.environ['SMTP_PASS'].replace(' ', ''))
                  s.sendmail(os.environ['SMTP_USER'], [os.environ['TO_ADDR']], msg.as_string())
              print('email sent OK')
          except Exception as e:
              print(f'email FAILED: {e}', file=sys.stderr)
              sys.exit(1)
          PY
          python3 /tmp/send_mail.py
